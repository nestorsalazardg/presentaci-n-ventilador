server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CORS headers for video
    location /video/ {
        add_header Access-Control-Allow-Origin "*";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip for faster loading
    gzip on;
    gzip_types text/plain text/css application/javascript video/mp4;
    gzip_min_length 1000;
}
